<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚢 Корабль + Прогулка (исправлено)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #020208; }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00f3ff;
      font-size: 20px;
      font-family: monospace;
      z-index: 50;
      text-shadow: 0 0 30px #00f3ff;
      animation: blink 1s infinite alternate;
    }
    @keyframes blink {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #00f0ff;
      background: rgba(0,0,0,0.7);
      padding: 8px 20px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      border: 1px solid #00f0ff;
      text-align: center;
      pointer-events: none;
    }
    #controls {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff007f;
      background: rgba(0,0,0,0.7);
      padding: 6px 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      z-index: 100;
      border: 1px solid #ff007f;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="loading">⏳ Загрузка корабля...</div>
<div id="controls">🎮 WASD — ходьба | Пробел — прыжок | Мышь — обзор</div>
<div id="info">🖱️ Нажми на экран, чтобы захватить мышь</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
  // ============================================================
  // 1. СЦЕНА
  // ============================================================
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

  // ============================================================
  // 2. КАМЕРА
  // ============================================================
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 3, 8);
  camera.rotation.order = 'YXZ';

  // ============================================================
  // 3. РЕНДЕРЕР
  // ============================================================
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);

  // ============================================================
  // 4. СВЕТ
  // ============================================================
  const ambient = new THREE.AmbientLight(0x222244, 0.6);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0x88ccff, 1.5);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  scene.add(dirLight);

  const backLight = new THREE.DirectionalLight(0xff4488, 0.4);
  backLight.position.set(-5, 5, -10);
  scene.add(backLight);

  const bottomLight = new THREE.PointLight(0x00f3ff, 0.8, 20);
  bottomLight.position.set(0, -2, 0);
  scene.add(bottomLight);

  // ============================================================
  // 5. ПОЛ
  // ============================================================
  const gridHelper = new THREE.GridHelper(100, 40, 0x00f3ff, 0x334466);
  gridHelper.position.y = -0.5;
  scene.add(gridHelper);

  const planeGeo = new THREE.PlaneGeometry(200, 200);
  const planeMat = new THREE.MeshPhongMaterial({
    color: 0x0a0a1a,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.position.y = -0.5;
  plane.receiveShadow = true;
  scene.add(plane);

  // ============================================================
  // 6. ПЕРСОНАЖ
  // ============================================================
  const playerGroup = new THREE.Group();
  scene.add(playerGroup);

  // Тело
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00ff88, flatShading: true });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.6), bodyMat);
  body.position.y = 0.7;
  body.castShadow = true;
  playerGroup.add(body);

  // Голова
  const headMat = new THREE.MeshPhongMaterial({ color: 0xffccaa, flatShading: true });
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), headMat);
  head.position.y = 1.5;
  head.castShadow = true;
  playerGroup.add(head);

  // Глаза
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  for (let side = -1; side <= 1; side += 2) {
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), eyeMat);
    eye.position.set(side * 0.2, 1.6, 0.35);
    playerGroup.add(eye);
    const pupil = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), pupilMat);
    pupil.position.set(side * 0.2, 1.6, 0.45);
    playerGroup.add(pupil);
  }

  const playerPos = { x: 0, z: 0, y: 0 };

  // ============================================================
  // 7. ЗАГРУЗКА КОРАБЛЯ (ОДИН РАЗ)
  // ============================================================
  const loader = new THREE.GLTFLoader();
  const loadingEl = document.getElementById('loading');
  let ship = null;

  loader.load(
    'models/karablik_Untitled.glb',
    (gltf) => {
      ship = gltf.scene;

      // Центрируем
      const box = new THREE.Box3().setFromObject(ship);
      const center = box.getCenter(new THREE.Vector3());
      ship.position.sub(center);
      ship.position.y = 0;

      // Масштабируем
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim > 5) {
        const scale = 5 / maxDim;
        ship.scale.set(scale, scale, scale);
      }

      // Тени
      ship.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.metalness = 0.6;
            child.material.roughness = 0.3;
          }
        }
      });

      // Ставим корабль рядом с игроком
      ship.position.set(4, 0, 4);
      scene.add(ship);

      loadingEl.style.display = 'none';
      console.log('✅ Корабль загружен!');
    },
    (xhr) => {
      const progress = Math.round((xhr.loaded / xhr.total) * 100);
      loadingEl.textContent = `⏳ Загрузка: ${progress}%`;
    },
    (error) => {
      console.error('❌ Ошибка:', error);
      loadingEl.textContent = '❌ Ошибка загрузки';
      loadingEl.style.color = '#ff3366';
    }
  );

  // ============================================================
  // 8. УПРАВЛЕНИЕ
  // ============================================================
  const keys = {};
  window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = true;
  });
  window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
    keys[e.code] = false;
  });

  // Мышь
  let isPointerLocked = false;
  renderer.domElement.addEventListener('click', () => {
    renderer.domElement.requestPointerLock();
  });
  document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement === renderer.domElement;
  });

  let euler = { x: 0, y: 0 };
  document.addEventListener('mousemove', (e) => {
    if (!isPointerLocked) return;
    euler.y -= e.movementX * 0.002;
    euler.x -= e.movementY * 0.002;
    euler.x = Math.max(-1.2, Math.min(1.2, euler.x));
    camera.rotation.order = 'YXZ';
    camera.rotation.x = euler.x;
    camera.rotation.y = euler.y;
  });

  // ============================================================
  // 9. АНИМАЦИЯ
  // ============================================================
  const speed = 0.15;
  let velocityY = 0;
  let isGrounded = true;

  function animate() {
    requestAnimationFrame(animate);

    // ---- ДВИЖЕНИЕ ----
    const forward = new THREE.Vector3(0, 0, -1);
    forward.applyQuaternion(camera.quaternion);
    forward.y = 0;
    forward.normalize();

    const right = new THREE.Vector3();
    right.crossVectors(forward, camera.up).normalize();

    let moveX = 0, moveZ = 0;
    if (keys['w'] || keys['arrowup']) moveZ += 1;
    if (keys['s'] || keys['arrowdown']) moveZ -= 1;
    if (keys['a'] || keys['arrowleft']) moveX -= 1;
    if (keys['d'] || keys['arrowright']) moveX += 1;

    if (Math.abs(moveX) > 0.05 || Math.abs(moveZ) > 0.05) {
      const len = Math.hypot(moveX, moveZ);
      moveX /= len;
      moveZ /= len;

      const dx = (forward.x * moveZ + right.x * moveX) * speed;
      const dz = (forward.z * moveZ + right.z * moveX) * speed;

      playerPos.x += dx;
      playerPos.z += dz;

      const angle = Math.atan2(moveX, moveZ);
      playerGroup.rotation.y = angle;
    }

    // Прыжок
    if ((keys['space'] || keys['Space']) && isGrounded) {
      velocityY = 0.2;
      isGrounded = false;
    }

    if (!isGrounded) {
      velocityY -= 0.008;
      playerPos.y += velocityY;
      if (playerPos.y <= 0) {
        playerPos.y = 0;
        velocityY = 0;
        isGrounded = true;
      }
    }

    playerGroup.position.set(playerPos.x, playerPos.y, playerPos.z);

    // ---- КАМЕРА ----
    const offset = new THREE.Vector3(0, 2.5, 6);
    offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), euler.y);
    offset.x += playerPos.x;
    offset.y += playerPos.y;
    offset.z += playerPos.z;

    camera.position.lerp(offset, 0.1);
    camera.lookAt(playerPos.x, playerPos.y + 1.5, playerPos.z);

    renderer.render(scene, camera);
  }

  animate();

  // ============================================================
  // 10. RESIZE
  // ============================================================
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  console.log('🚢 Готово! Один корабль, один игрок.');
</script>
</body>
</html>
