<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏙️ Angelos City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #020208; font-family: 'Courier New', monospace; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #00f0ff;
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 100;
      border: 1px solid #00f0ff;
      text-align: center;
      pointer-events: none;
    }
    #count {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #ff007f;
      font-size: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #ff007f;
    }
  </style>
</head>
<body>

<div id="info">🎮 WASD — ходьба | Пробел — взлёт | Shift — спуск | 🖱️ Мышь — обзор</div>
<div id="count">👤 1 игрок</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// =============================================
// ВЕСЬ ИГРОВОЙ ДВИЖОК В ОДНОМ ФАЙЛЕ
// =============================================

// 1. СЦЕНА
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.018);

// 2. КАМЕРА
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 350);
camera.position.set(0, 1.8, 35);
camera.rotation.order = 'YXZ';

// 3. РЕНДЕРЕР
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.prepend(renderer.domElement);

// 4. СВЕТ
const ambient = new THREE.AmbientLight(0x222244, 1.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0x00f0ff, 2);
dirLight.position.set(20, 100, 20);
scene.add(dirLight);

const pinkLight = new THREE.PointLight(0xff007f, 5, 50);
pinkLight.position.set(0, 4, 0);
scene.add(pinkLight);

// 5. ПОЛ
const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshPhongMaterial({ color: 0x030308 })
);
plane.rotation.x = -Math.PI / 2;
scene.add(plane);

// 6. СЕТКА
const grid = new THREE.GridHelper(400, 80, 0xff007f, 0x00f0ff);
grid.position.y = 0.01;
scene.add(grid);

// 7. ЗДАНИЯ
const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
const darkMat = new THREE.MeshPhongMaterial({ color: 0x060911, flatShading: true });
const cyanMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff });
const pinkMat = new THREE.MeshBasicMaterial({ color: 0xff007f });
const yellowMat = new THREE.MeshBasicMaterial({ color: 0xffb703 });

const buildings = [];
const gridSize = 28;

for (let x = -gridSize; x <= gridSize; x += 3) {
  for (let z = -gridSize; z <= gridSize; z += 3) {
    if (Math.abs(x) % 6 === 0 || Math.abs(z) % 6 === 0) continue;
    
    const height = Math.floor(Math.random() * 32) + 12;
    const posX = x * 1.6;
    const posZ = z * 1.6;

    for (let y = 0; y < height; y++) {
      const isWindow = Math.random() < 0.12;
      const isTop = (y === height - 1);

      let material = darkMat;
      if (isWindow) material = Math.random() > 0.5 ? cyanMat : pinkMat;
      else if (isTop && Math.random() < 0.5) material = yellowMat;

      const cube = new THREE.Mesh(cubeGeo, material);
      cube.scale.set(2.2, 1, 2.2);
      cube.position.set(posX, y + 0.5, posZ);
      scene.add(cube);
    }

    buildings.push({
      x: posX,
      z: posZ,
      halfSize: 1.1,
      height: height
    });
  }
}

// 8. ПЕРСОНАЖ (игрок)
const playerGroup = new THREE.Group();
scene.add(playerGroup);

// Тело
const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00ff88, flatShading: true });
const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.6), bodyMat);
body.position.y = 0.7;
playerGroup.add(body);

// Голова
const headMat = new THREE.MeshPhongMaterial({ color: 0xffccaa, flatShading: true });
const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), headMat);
head.position.y = 1.5;
playerGroup.add(head);

// Глаза
const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

for (let side = -1; side <= 1; side += 2) {
  const eye = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), eyeMat);
  eye.position.set(side * 0.2, 1.6, 0.35);
  playerGroup.add(eye);
  
  const pupil = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), pupilMat);
  pupil.position.set(side * 0.2, 1.6, 0.45);
  playerGroup.add(pupil);
}

// Стрелка сверху (чтобы видеть себя)
const arrowMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
const arrow1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.1), arrowMat);
arrow1.position.set(0, 1.9, 0.35);
playerGroup.add(arrow1);

const arrow2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.3), arrowMat);
arrow2.position.set(0, 1.9, 0.35);
playerGroup.add(arrow2);

// 9. КОЛЛИЗИИ
const playerRadius = 0.8;

function checkCollision(x, z) {
  for (let b of buildings) {
    const dx = Math.abs(x - b.x);
    const dz = Math.abs(z - b.z);
    if (dx < b.halfSize + playerRadius && dz < b.halfSize + playerRadius) {
      return true;
    }
  }
  return false;
}

// 10. УПРАВЛЕНИЕ
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  keys[e.code] = true;
});
window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
  keys[e.code] = false;
});

// Мышь для обзора
let isPointerLocked = false;
document.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
  if (!isPointerLocked) return;
  camera.rotation.y -= e.movementX * 0.002;
  camera.rotation.x -= e.movementY * 0.002;
  camera.rotation.x = Math.max(-1.2, Math.min(1.2, camera.rotation.x));
});

// 11. ГЛАВНЫЙ ЦИКЛ
function animate() {
  requestAnimationFrame(animate);

  // Движение
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, camera.up).normalize();

  let moveX = 0, moveZ = 0;
  if (keys['w'] || keys['arrowup']) moveZ += 1;
  if (keys['s'] || keys['arrowdown']) moveZ -= 1;
  if (keys['a'] || keys['arrowleft']) moveX -= 1;
  if (keys['d'] || keys['arrowright']) moveX += 1;

  if (Math.abs(moveX) > 0.05 || Math.abs(moveZ) > 0.05) {
    const len = Math.hypot(moveX, moveZ);
    moveX /= len;
    moveZ /= len;
    
    const speed = 0.15;
    const newX = camera.position.x + (forward.x * moveZ + right.x * moveX) * speed;
    const newZ = camera.position.z + (forward.z * moveZ + right.z * moveX) * speed;
    
    if (!checkCollision(newX, camera.position.z)) {
      camera.position.x = newX;
    }
    if (!checkCollision(camera.position.x, newZ)) {
      camera.position.z = newZ;
    }
    
    // Поворачиваем персонажа в сторону движения
    const angle = Math.atan2(moveX, moveZ);
    playerGroup.rotation.y = angle;
  }

  // Персонаж всегда под камерой
  playerGroup.position.set(camera.position.x, 0, camera.position.z);

  // Взлёт/спуск
  if (keys['space']) camera.position.y += 0.12;
  if (keys['shift']) camera.position.y = Math.max(1.2, camera.position.y - 0.12);

  renderer.render(scene, camera);
}

animate();

// 12. RESIZE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('🏙️ Angelos City загружен!');
</script>
</body>
</html>
