<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚢 3D Кораблик</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #020208; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #00f0ff;
      background: rgba(0,0,0,0.7);
      padding: 8px 20px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      border: 1px solid #00f0ff;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00f3ff;
      font-size: 20px;
      font-family: monospace;
      z-index: 50;
      text-shadow: 0 0 30px #00f3ff;
      animation: blink 1s infinite alternate;
    }
    @keyframes blink {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<div id="loading">⏳ Загрузка корабля...</div>
<div id="info">🖱️ Мышь — вращать | Колесо — приблизить</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
  // =============================================
  // 1. СЦЕНА
  // =============================================
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  // =============================================
  // 2. КАМЕРА
  // =============================================
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(5, 3, 8);
  camera.lookAt(0, 0, 0);

  // =============================================
  // 3. РЕНДЕРЕР
  // =============================================
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);

  // =============================================
  // 4. УПРАВЛЕНИЕ (OrbitControls)
  // =============================================
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 2;
  controls.maxDistance = 20;
  controls.target.set(0, 1, 0);

  // =============================================
  // 5. СВЕТ
  // =============================================
  // Ambient
  const ambient = new THREE.AmbientLight(0x222244, 0.5);
  scene.add(ambient);

  // Основной свет
  const dirLight = new THREE.DirectionalLight(0x88ccff, 1.5);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // Дополнительный свет сзади
  const backLight = new THREE.DirectionalLight(0xff4488, 0.5);
  backLight.position.set(-5, 5, -10);
  scene.add(backLight);

  // Неоновый свет снизу
  const bottomLight = new THREE.PointLight(0x00f3ff, 1, 20);
  bottomLight.position.set(0, -2, 0);
  scene.add(bottomLight);

  // =============================================
  // 6. ПОЛ
  // =============================================
  const gridHelper = new THREE.GridHelper(20, 20, 0x00f3ff, 0x334466);
  gridHelper.position.y = -0.5;
  scene.add(gridHelper);

  // Полупрозрачная плоскость
  const planeGeo = new THREE.PlaneGeometry(30, 30);
  const planeMat = new THREE.MeshPhongMaterial({
    color: 0x0a0a1a,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.position.y = -0.5;
  plane.receiveShadow = true;
  scene.add(plane);

  // =============================================
  // 7. ЗАГРУЗКА КОРАБЛЯ (.glb)
  // =============================================
  const loader = new THREE.GLTFLoader();
  const loadingEl = document.getElementById('loading');

  // Путь к твоему файлу (положи в папку models/)
  const modelPath = 'models/karablik_Untitled.glb';

  loader.load(
    modelPath,
    (gltf) => {
      const model = gltf.scene;
      
      // Центрируем модель
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      model.position.y += 0.5;
      
      // Масштабируем если нужно
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim > 5) {
        const scale = 5 / maxDim;
        model.scale.set(scale, scale, scale);
      }

      // Включаем тени
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          // Добавляем красивый материал
          if (child.material) {
            child.material.metalness = 0.6;
            child.material.roughness = 0.3;
          }
        }
      });

      scene.add(model);
      loadingEl.style.display = 'none';
      console.log('✅ Корабль загружен!');
    },
    (xhr) => {
      const progress = Math.round((xhr.loaded / xhr.total) * 100);
      loadingEl.textContent = `⏳ Загрузка: ${progress}%`;
    },
    (error) => {
      console.error('❌ Ошибка загрузки:', error);
      loadingEl.textContent = '❌ Не удалось загрузить корабль';
      loadingEl.style.color = '#ff3366';
    }
  );

  // =============================================
  // 8. АНИМАЦИЯ
  // =============================================
  function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Плавный поворот корабля (если нужно)
    // scene.children.forEach(child => {
    //   if (child.isGroup) child.rotation.y += 0.002;
    // });

    renderer.render(scene, camera);
  }

  animate();

  // =============================================
  // 9. RESIZE
  // =============================================
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
