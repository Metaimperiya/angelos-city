<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angelos City — Мультиплеер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #020208; font-family: 'Courier New', monospace; }

    /* ===== МЕНЮ ВХОДА ===== */
    #menu {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(2, 2, 8, 0.92);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
    }
    #menu h1 {
      color: #00f3ff;
      font-size: 48px;
      text-shadow: 0 0 30px #00f3ff, 0 0 60px #00aaff;
      margin-bottom: 10px;
    }
    #menu p {
      color: #667799;
      font-size: 16px;
      margin-bottom: 30px;
    }
    #menu input {
      background: transparent;
      border: 1px solid #00f3ff;
      color: #00f3ff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 18px;
      text-align: center;
      width: 250px;
      outline: none;
      font-family: 'Courier New', monospace;
    }
    #menu input::placeholder { color: #334466; }
    #menu .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #menu button {
      background: transparent;
      border: 1px solid #ff007f;
      color: #ff007f;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
    }
    #menu button:hover {
      background: #ff007f;
      color: #000;
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
    }
    #menu button.primary {
      border-color: #00f3ff;
      color: #00f3ff;
    }
    #menu button.primary:hover {
      background: #00f3ff;
      color: #000;
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
    }
    #menu .error {
      color: #ff3366;
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    /* ===== ЧАТ ===== */
    #chat {
      position: absolute;
      bottom: 80px;
      left: 20px;
      width: 320px;
      max-height: 300px;
      z-index: 100;
      display: none;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid #00f3ff;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
    }
    #chat.messages {
      display: flex;
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      max-height: 220px;
      color: #aabbdd;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 8px;
      padding-right: 5px;
    }
    #chat-log::-webkit-scrollbar { width: 3px; }
    #chat-log::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 3px; }
    #chat-log .msg { margin-bottom: 2px; }
    #chat-log .msg .name { color: #00f3ff; font-weight: bold; }
    #chat-log .msg .text { color: #ffffff; }
    #chat-log .system { color: #ff007f; font-style: italic; }
    #chat-input-row {
      display: flex;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      background: transparent;
      border: 1px solid #334466;
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      font-family: 'Courier New', monospace;
    }
    #chat-input:focus { border-color: #00f3ff; }
    #chat-send {
      background: transparent;
      border: 1px solid #00f3ff;
      color: #00f3ff;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    #chat-send:hover { background: #00f3ff; color: #000; }

    /* ===== ИНФО СВЕРХУ ===== */
    #info {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: #00f0ff;
      background: rgba(0,0,0,0.7);
      padding: 6px 16px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 100;
      border: 1px solid #00f0ff;
      pointer-events: none;
      text-align: center;
      display: none;
    }
    #room-code {
      position: absolute;
      top: 15px;
      right: 20px;
      color: #ff007f;
      font-size: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #ff007f;
      display: none;
    }
    #player-count {
      position: absolute;
      top: 15px;
      left: 20px;
      color: #00ff88;
      font-size: 13px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #00ff88;
      display: none;
    }
    #chat-toggle {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 99;
      background: transparent;
      border: 1px solid #00f3ff;
      color: #00f3ff;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      display: none;
    }
    #chat-toggle:hover { background: #00f3ff; color: #000; }
  </style>
</head>
<body>

<!-- ===== МЕНЮ ВХОДА ===== -->
<div id="menu">
  <h1>🏙️ Angelos City</h1>
  <p>Создай комнату или войди по коду</p>
  <input id="room-input" type="text" placeholder="Код комнаты (4-6 цифр)" maxlength="6">
  <div class="btn-group">
    <button class="primary" id="btn-create">✨ Создать комнату</button>
    <button id="btn-join">🔑 Войти в комнату</button>
  </div>
  <div class="error" id="menu-error"></div>
</div>

<!-- ===== ЧАТ ===== -->
<div id="chat">
  <div id="chat-log"></div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Написать..." maxlength="100">
    <button id="chat-send">➤</button>
  </div>
</div>
<button id="chat-toggle">💬 Чат</button>

<!-- ===== ИНФО ===== -->
<div id="info">🎮 WASD — ходьба | Пробел — взлёт | Shift — спуск | 🖱️ Мышь — обзор</div>
<div id="room-code">🏷️ Код: <span id="code-display"></span></div>
<div id="player-count">👥 <span id="count-display">1</span></div>

<!-- ===== ТРИ.JS ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ============================================================
// 1. ПОДКЛЮЧЕНИЕ К FIREBASE
// ============================================================
// Используем бесплатный сервис для демо — через PeerJS (WebRTC)
// В реальном проекте можно заменить на Firebase Realtime Database

// Для демо используем простой WebSocket-сервер через PeerJS
// Но чтобы не зависеть от сервера — делаем через BroadcastChannel (для двух вкладок)
// И через localStorage для синхронизации

// ============================================================
// 2. ЛОКАЛЬНАЯ СЕТЬ (для демо на одном устройстве)
// ============================================================
class LocalNetwork {
  constructor() {
    this.players = {};
    this.myId = 'player_' + Math.random().toString(36).substr(2, 4);
    this.roomCode = '';
    this.isHost = false;
    this.listeners = {};
    this.channel = null;
  }

  init(roomCode, isHost) {
    this.roomCode = roomCode;
    this.isHost = isHost;
    
    // Используем BroadcastChannel для обмена между вкладками
    try {
      this.channel = new BroadcastChannel('angelos_city_' + roomCode);
      this.channel.onmessage = (e) => {
        const data = e.data;
        if (data.type === 'join') {
          // Новый игрок
          if (!this.players[data.id]) {
            this.players[data.id] = {
              x: data.x || 0,
              z: data.z || 0,
              y: data.y || 1.8,
              name: data.name || 'Игрок'
            };
            this.emit('playerJoin', data.id, this.players[data.id]);
          }
        }
        if (data.type === 'move') {
          if (this.players[data.id]) {
            this.players[data.id].x = data.x;
            this.players[data.id].z = data.z;
            this.players[data.id].rotation = data.rotation || 0;
            this.emit('playerMove', data.id, this.players[data.id]);
          }
        }
        if (data.type === 'leave') {
          if (this.players[data.id]) {
            delete this.players[data.id];
            this.emit('playerLeave', data.id);
          }
        }
        if (data.type === 'chat') {
          this.emit('chatMessage', data.id, data.text, data.name);
        }
        if (data.type === 'sync') {
          // Синхронизация всех игроков
          for (const [id, player] of Object.entries(data.players)) {
            if (id !== this.myId && !this.players[id]) {
              this.players[id] = player;
              this.emit('playerJoin', id, player);
            }
          }
        }
      };
    } catch (e) {
      console.log('BroadcastChannel не поддерживается');
    }

    // Если хост — рассылаем приглашение
    if (isHost) {
      this.players[this.myId] = {
        x: 0, z: 0, y: 1.8, name: 'Хост'
      };
      setTimeout(() => {
        this.broadcast({ type: 'sync', players: this.players });
      }, 500);
    }

    // Регистрируем себя
    this.broadcast({
      type: 'join',
      id: this.myId,
      x: 0,
      z: 0,
      y: 1.8,
      name: this.isHost ? 'Хост' : 'Игрок'
    });

    // Обновляем список каждые 3 секунды (для синхронизации)
    setInterval(() => {
      this.broadcast({ type: 'sync', players: this.players });
    }, 3000);
  }

  broadcast(data) {
    if (this.channel) {
      try {
        this.channel.postMessage(data);
      } catch (e) {}
    }
  }

  on(event, callback) {
    if (!this.listeners[event]) this.listeners[event] = [];
    this.listeners[event].push(callback);
  }

  emit(event, ...args) {
    if (this.listeners[event]) {
      for (const cb of this.listeners[event]) {
        cb(...args);
      }
    }
  }

  sendMove(x, z, y, rotation) {
    if (this.players[this.myId]) {
      this.players[this.myId].x = x;
      this.players[this.myId].z = z;
      this.players[this.myId].y = y;
      this.players[this.myId].rotation = rotation || 0;
    }
    this.broadcast({
      type: 'move',
      id: this.myId,
      x, z, y,
      rotation: rotation || 0
    });
  }

  sendChat(text, name) {
    this.broadcast({
      type: 'chat',
      id: this.myId,
      text: text,
      name: name || 'Игрок'
    });
  }

  getPlayers() {
    return this.players;
  }

  getMyId() {
    return this.myId;
  }
}

// ============================================================
// 3. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
// ============================================================
let network = null;
let myId = null;
const remotePlayers = {};
let chatVisible = false;
let playerName = '';

// ============================================================
// 4. THREE.JS СЦЕНА
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.018);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 350);
camera.position.set(0, 1.8, 25);
camera.rotation.order = 'YXZ';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.prepend(renderer.domElement);

// ============================================================
// 5. СВЕТ
// ============================================================
const ambient = new THREE.AmbientLight(0x222244, 1.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0x00f0ff, 2);
dirLight.position.set(20, 100, 20);
scene.add(dirLight);

const pinkLight = new THREE.PointLight(0xff007f, 5, 50);
pinkLight.position.set(0, 4, 0);
scene.add(pinkLight);

// ============================================================
// 6. ПОЛ И СЕТКА
// ============================================================
const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshPhongMaterial({ color: 0x030308 })
);
plane.rotation.x = -Math.PI / 2;
scene.add(plane);

const grid = new THREE.GridHelper(400, 80, 0xff007f, 0x00f0ff);
grid.position.y = 0.01;
scene.add(grid);

// ============================================================
// 7. ЗДАНИЯ
// ============================================================
const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
const darkMat = new THREE.MeshPhongMaterial({ color: 0x060911, flatShading: true });
const cyanMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff });
const pinkMat = new THREE.MeshBasicMaterial({ color: 0xff007f });
const yellowMat = new THREE.MeshBasicMaterial({ color: 0xffb703 });

const buildings = [];
const gridSize = 28;

for (let x = -gridSize; x <= gridSize; x += 3) {
  for (let z = -gridSize; z <= gridSize; z += 3) {
    if (Math.abs(x) % 6 === 0 || Math.abs(z) % 6 === 0) continue;
    
    const height = Math.floor(Math.random() * 32) + 12;
    const posX = x * 1.6;
    const posZ = z * 1.6;

    for (let y = 0; y < height; y++) {
      const isWindow = Math.random() < 0.12;
      const isTop = (y === height - 1);

      let material = darkMat;
      if (isWindow) material = Math.random() > 0.5 ? cyanMat : pinkMat;
      else if (isTop && Math.random() < 0.5) material = yellowMat;

      const cube = new THREE.Mesh(cubeGeo, material);
      cube.scale.set(2.2, 1, 2.2);
      cube.position.set(posX, y + 0.5, posZ);
      scene.add(cube);
    }

    buildings.push({
      x: posX,
      z: posZ,
      halfSize: 1.1,
      height: height
    });
  }
}

// ============================================================
// 8. ПЕРСОНАЖИ
// ============================================================
const playerGroup = new THREE.Group();
scene.add(playerGroup);

const localPlayerGroup = new THREE.Group();
playerGroup.add(localPlayerGroup);

function createPlayerMesh(color = 0x00ff88, name = '') {
  const group = new THREE.Group();

  // Тело
  const bodyMat = new THREE.MeshPhongMaterial({ color: color, flatShading: true });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.6), bodyMat);
  body.position.y = 0.7;
  group.add(body);

  // Голова
  const headMat = new THREE.MeshPhongMaterial({ color: 0xffccaa, flatShading: true });
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), headMat);
  head.position.y = 1.5;
  group.add(head);

  // Глаза
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

  for (let side = -1; side <= 1; side += 2) {
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), eyeMat);
    eye.position.set(side * 0.2, 1.6, 0.35);
    group.add(eye);
    
    const pupil = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), pupilMat);
    pupil.position.set(side * 0.2, 1.6, 0.45);
    group.add(pupil);
  }

  return group;
}

// Локальный игрок (зелёный)
const localMesh = createPlayerMesh(0x00ff88);
localPlayerGroup.add(localMesh);

// Список удалённых игроков
const remoteMeshes = {};

function addRemotePlayer(id, color, name) {
  const mesh = createPlayerMesh(color);
  playerGroup.add(mesh);
  remoteMeshes[id] = { mesh, color, name };
  return mesh;
}

function removeRemotePlayer(id) {
  if (remoteMeshes[id]) {
    playerGroup.remove(remoteMeshes[id].mesh);
    delete remoteMeshes[id];
  }
}

// ============================================================
// 9. КОЛЛИЗИИ
// ============================================================
const playerRadius = 0.8;

function checkCollision(x, z) {
  for (let b of buildings) {
    const dx = Math.abs(x - b.x);
    const dz = Math.abs(z - b.z);
    if (dx < b.halfSize + playerRadius && dz < b.halfSize + playerRadius) {
      return true;
    }
  }
  return false;
}

// ============================================================
// 10. УПРАВЛЕНИЕ
// ============================================================
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  keys[e.code] = true;
  
  // Чат по Enter
  if (e.key === 'Enter' && document.activeElement !== document.getElementById('chat-input')) {
    toggleChat();
  }
  // Закрыть чат по Escape
  if (e.key === 'Escape' && chatVisible) {
    toggleChat();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
  keys[e.code] = false;
});

// Мышь
let isPointerLocked = false;
document.addEventListener('click', () => {
  if (!document.getElementById('menu').style.display || document.getElementById('menu').style.display !== 'none') return;
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
  if (!isPointerLocked) return;
  camera.rotation.y -= e.movementX * 0.002;
  camera.rotation.x -= e.movementY * 0.002;
  camera.rotation.x = Math.max(-1.2, Math.min(1.2, camera.rotation.x));
});

// ============================================================
// 11. ЧАТ
// ============================================================
const chatLog = document.getElementById('chat-log');
const chatInput = document.getElementById('chat-input');
const chatSend = document.getElementById('chat-send');
const chatToggle = document.getElementById('chat-toggle');
const chatEl = document.getElementById('chat');

function toggleChat() {
  chatVisible = !chatVisible;
  chatEl.style.display = chatVisible ? 'flex' : 'none';
  if (chatVisible) {
    chatInput.focus();
  }
}

chatToggle.addEventListener('click', toggleChat);

chatSend.addEventListener('click', sendChatMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendChatMessage();
});

function sendChatMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  if (network) {
    network.sendChat(text, playerName || 'Игрок');
  }
  addChatMessage('Я', text, '#00ff88');
  chatInput.value = '';
}

function addChatMessage(name, text, color = '#00f3ff') {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<span class="name" style="color:${color}">${name}:</span> <span class="text">${text}</span>`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'system';
  div.textContent = '📢 ' + text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

// ============================================================
// 12. МЕНЮ ВХОДА
// ============================================================
const menu = document.getElementById('menu');
const roomInput = document.getElementById('room-input');
const btnCreate = document.getElementById('btn-create');
const btnJoin = document.getElementById('btn-join');
const menuError = document.getElementById('menu-error');

function generateRoomCode() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

btnCreate.addEventListener('click', () => {
  const code = generateRoomCode();
  roomInput.value = code;
  startGame(code, true);
});

btnJoin.addEventListener('click', () => {
  const code = roomInput.value.trim();
  if (!code || code.length < 3) {
    menuError.textContent = '❌ Введите код комнаты (минимум 3 символа)';
    return;
  }
  startGame(code, false);
});

roomInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') btnJoin.click();
});

function startGame(roomCode, isHost) {
  menuError.textContent = '';
  playerName = isHost ? 'Хост' : 'Игрок';
  
  // Скрываем меню
  menu.style.display = 'none';
  
  // Показываем игровой интерфейс
  document.getElementById('info').style.display = 'block';
  document.getElementById('room-code').style.display = 'block';
  document.getElementById('player-count').style.display = 'block';
  document.getElementById('code-display').textContent = roomCode;
  chatToggle.style.display = 'block';
  
  // Создаём сеть
  network = new LocalNetwork();
  network.init(roomCode, isHost);
  myId = network.getMyId();
  
  // Подписываемся на события
  network.on('playerJoin', (id, player) => {
    if (id === myId) return;
    const colors = [0xff4488, 0x44ff88, 0xffaa44, 0x8844ff, 0x44ddff];
    const color = colors[Object.keys(remoteMeshes).length % colors.length];
    addRemotePlayer(id, color, player.name || 'Игрок');
    addSystemMessage(`👤 ${player.name || 'Игрок'} вошёл в комнату`);
    updatePlayerCount();
  });
  
  network.on('playerMove', (id, player) => {
    if (id === myId) return;
    if (remoteMeshes[id]) {
      remoteMeshes[id].mesh.position.set(player.x || 0, 0, player.z || 0);
      if (player.rotation) {
        remoteMeshes[id].mesh.rotation.y = player.rotation;
      }
    }
  });
  
  network.on('playerLeave', (id) => {
    if (remoteMeshes[id]) {
      const name = remoteMeshes[id].name || 'Игрок';
      removeRemotePlayer(id);
      addSystemMessage(`👤 ${name} покинул комнату`);
      updatePlayerCount();
    }
  });
  
  network.on('chatMessage', (id, text, name) => {
    if (id === myId) return;
    const colors = { 'Хост': '#ff007f', 'Игрок': '#00f3ff' };
    const color = colors[name] || '#ffaa44';
    addChatMessage(name || 'Игрок', text, color);
  });
  
  // Добавляем себя
  addSystemMessage(`✅ Вы вошли в комнату ${roomCode}${isHost ? ' (хост)' : ''}`);
  updatePlayerCount();
}

function updatePlayerCount() {
  if (network) {
    const count = Object.keys(network.getPlayers()).length;
    document.getElementById('count-display').textContent = count;
  }
}

// ============================================================
// 13. ГЛАВНЫЙ ЦИКЛ
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  if (network) {
    // Движение
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();

    const right = new THREE.Vector3();
    right.crossVectors(forward, camera.up).normalize();

    let moveX = 0, moveZ = 0;
    if (keys['w'] || keys['arrowup']) moveZ += 1;
    if (keys['s'] || keys['arrowdown']) moveZ -= 1;
    if (keys['a'] || keys['arrowleft']) moveX -= 1;
    if (keys['d'] || keys['arrowright']) moveX += 1;

    let moved = false;
    let newX = camera.position.x;
    let newZ = camera.position.z;
    let angle = 0;

    if (Math.abs(moveX) > 0.05 || Math.abs(moveZ) > 0.05) {
      const len = Math.hypot(moveX, moveZ);
      moveX /= len;
      moveZ /= len;
      
      const speed = 0.15;
      const dx = (forward.x * moveZ + right.x * moveX) * speed;
      const dz = (forward.z * moveZ + right.z * moveX) * speed;
      
      if (!checkCollision(camera.position.x + dx, camera.position.z)) {
        camera.position.x += dx;
        moved = true;
      }
      if (!checkCollision(camera.position.x, camera.position.z + dz)) {
        camera.position.z += dz;
        moved = true;
      }
      
      angle = Math.atan2(moveX, moveZ);
      localPlayerGroup.rotation.y = angle;
      newX = camera.position.x;
      newZ = camera.position.z;
    }

    // Обновляем локального игрока
    localPlayerGroup.position.set(camera.position.x, 0, camera.position.z);

    // Взлёт/спуск
    if (keys['space']) camera.position.y += 0.12;
    if (keys['shift']) camera.position.y = Math.max(1.2, camera.position.y - 0.12);

    // Отправляем движение
    if (moved) {
      network.sendMove(camera.position.x, camera.position.z, camera.position.y, angle);
    }
  }

  renderer.render(scene, camera);
}

animate();

// ============================================================
// 14. RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// 15. ЗАГРУЗКА
// ============================================================
console.log('🏙️ Angelos City загружен!');
</script>
